<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Библиотека Корана</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #e8c97a;
    --dark: #0d1117; --dark-2: #161b22; --dark-3: #1c2330; --dark-4: #21282f;
    --text: #e8e0d0; --text-muted: #8b8070;
    --green: #3a7d5a; --green-light: #4a9d70;
    --border: rgba(201,168,76,0.18); --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image: radial-gradient(ellipse 80% 60% at 20% 10%,rgba(201,168,76,.07) 0%,transparent 60%), radial-gradient(ellipse 60% 80% at 80% 90%,rgba(58,125,90,.07) 0%,transparent 60%); pointer-events:none; z-index:0; }
  .app { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:0 20px 110px; }

  header { text-align:center; padding:48px 20px 32px; }
  .header-ornament { font-size:1.4rem; color:var(--gold); opacity:.5; letter-spacing:14px; margin-bottom:16px; }
  header h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2.2rem,5vw,3.5rem); font-weight:700; color:var(--gold-light); text-shadow:0 0 48px rgba(201,168,76,.25); margin-bottom:10px; line-height:1.15; }
  header p { color:var(--text-muted); font-size:.92rem; font-weight:300; }
  .divider { display:flex; align-items:center; gap:16px; margin:24px 0; }
  .divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .divider-icon { color:var(--gold); font-size:1rem; opacity:.65; }

  .main-tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--dark-2); border:1px solid var(--border); border-radius:50px; padding:4px; width:fit-content; }
  .main-tab { padding:9px 22px; border-radius:50px; border:none; cursor:pointer; font-family:'Inter',sans-serif; font-size:.88rem; font-weight:500; color:var(--text-muted); background:transparent; transition:all .2s; display:flex; align-items:center; gap:7px; }
  .main-tab.active { background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.06)); color:var(--gold-light); }
  .main-tab:hover:not(.active) { color:var(--text); }
  .fav-count { background:var(--gold); color:#1a1200; border-radius:10px; padding:1px 6px; font-size:.7rem; font-weight:700; }

  .search-bar { position:relative; margin-bottom:22px; }
  .search-bar input { width:100%; background:var(--dark-2); border:1px solid var(--border); border-radius:50px; padding:13px 20px 13px 48px; color:var(--text); font-size:.92rem; font-family:'Inter',sans-serif; outline:none; transition:border-color .2s,box-shadow .2s; }
  .search-bar input::placeholder { color:var(--text-muted); }
  .search-bar input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,.1); }
  .search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }

  .controls { display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap; }
  .btn { display:inline-flex; align-items:center; gap:7px; padding:10px 20px; border-radius:50px; border:none; cursor:pointer; font-family:'Inter',sans-serif; font-size:.88rem; font-weight:500; transition:all .2s; white-space:nowrap; }
  .btn-gold { background:linear-gradient(135deg,var(--gold),#a87c2a); color:#1a1200; font-weight:600; box-shadow:0 4px 16px rgba(201,168,76,.22); }
  .btn-gold:hover { transform:translateY(-2px); box-shadow:0 6px 22px rgba(201,168,76,.38); }
  .btn-ghost { background:var(--dark-2); border:1px solid var(--border); color:var(--text); }
  .btn-ghost:hover { border-color:var(--gold); color:var(--gold); }

  .section-title { font-size:.72rem; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; display:flex; align-items:center; gap:12px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .reciters-grid { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:32px; }
  .reciter-tab { background:var(--dark-2); border:1px solid var(--border); border-radius:50px; padding:9px 18px; cursor:pointer; font-size:.88rem; font-weight:400; color:var(--text); transition:all .2s; display:flex; align-items:center; gap:9px; animation:fadeIn .3s ease; user-select:none; }
  .reciter-tab:hover { border-color:rgba(201,168,76,.5); color:var(--gold-light); }
  .reciter-tab.active { background:linear-gradient(135deg,rgba(201,168,76,.14),rgba(201,168,76,.03)); border-color:var(--gold); color:var(--gold-light); box-shadow:0 0 18px rgba(201,168,76,.1); }
  .avatar { width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--gold),var(--green)); display:flex; align-items:center; justify-content:center; font-size:.68rem; font-weight:700; color:#fff; flex-shrink:0; }
  .badge { background:rgba(201,168,76,.14); border:1px solid rgba(201,168,76,.24); border-radius:20px; padding:1px 8px; font-size:.7rem; color:var(--gold); }
  .del-btn { width:17px; height:17px; border-radius:50%; background:rgba(180,40,40,.35); border:none; color:#faa; cursor:pointer; font-size:.62rem; display:none; align-items:center; justify-content:center; margin-right:-3px; transition:all .15s; flex-shrink:0; }
  .reciter-tab:hover .del-btn { display:flex; }
  .del-btn:hover { background:rgba(200,40,40,.75)!important; transform:scale(1.1); }
  .empty-box { text-align:center; padding:28px; color:var(--text-muted); font-size:.88rem; width:100%; }
  .empty-box .icon { font-size:2rem; margin-bottom:10px; opacity:.3; }

  .tracks-panel { background:var(--dark-2); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; animation:slideUp .28s ease; }
  .tracks-header { padding:18px 22px; border-bottom:1px solid var(--border); background:var(--dark-3); display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .tracks-header-left { display:flex; align-items:center; gap:14px; min-width:0; }
  .tracks-header h2 { font-family:'Cormorant Garamond',serif; font-size:1.35rem; font-weight:600; color:var(--gold-light); }
  .tracks-header p { font-size:.76rem; color:var(--text-muted); font-weight:300; margin-top:2px; }
  .tracks-list { padding:10px; }

  .track-item { display:flex; align-items:center; gap:13px; padding:12px 14px; border-radius:10px; cursor:pointer; transition:all .18s; border:1px solid transparent; animation:fadeIn .25s ease; margin-bottom:3px; }
  .track-item:hover { background:var(--dark-4); border-color:var(--border); }
  .track-item.playing { background:linear-gradient(135deg,rgba(201,168,76,.09),rgba(58,125,90,.06)); border-color:rgba(201,168,76,.22); }
  .track-num { width:34px; height:34px; border-radius:50%; background:var(--dark-3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:.78rem; color:var(--text-muted); flex-shrink:0; transition:all .18s; font-weight:500; }
  .track-item.playing .track-num { background:var(--gold); border-color:var(--gold); color:#1a1200; }
  .track-item:not(.playing):hover .track-num { border-color:rgba(201,168,76,.5); color:var(--gold); }
  .track-info { flex:1; min-width:0; }
  .track-name { font-size:.92rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
  .track-item.playing .track-name { color:var(--gold-light); }
  .track-desc-text { font-size:.75rem; color:var(--text-muted); font-weight:300; }
  .track-actions { display:flex; align-items:center; gap:4px; flex-shrink:0; }

  .play-icon-wrap { width:30px; height:30px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; color:#1a1200; font-size:.68rem; flex-shrink:0; opacity:0; transition:opacity .18s; }
  .track-item:hover .play-icon-wrap, .track-item.playing .play-icon-wrap { opacity:1; }
  .track-item.playing .play-icon-wrap { animation:pulse 1.6s infinite; }

  .fav-btn { width:30px; height:30px; border-radius:50%; background:transparent; border:1px solid transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.95rem; transition:all .18s; opacity:0; flex-shrink:0; color:var(--text-muted); }
  .track-item:hover .fav-btn, .fav-btn.active { opacity:1; }
  .fav-btn.active { color:var(--gold); }
  .fav-btn:hover { background:rgba(201,168,76,.12); border-color:rgba(201,168,76,.3); color:var(--gold); }

  .track-del-btn { width:28px; height:28px; border-radius:50%; background:transparent; border:1px solid transparent; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.8rem; opacity:0; transition:all .15s; flex-shrink:0; }
  .track-item:hover .track-del-btn { opacity:1; }
  .track-del-btn:hover { background:rgba(180,40,40,.2); border-color:rgba(180,40,40,.4); color:#e07070; }

  .empty-tracks { text-align:center; padding:52px 20px; color:var(--text-muted); }
  .empty-tracks .icon { font-size:2.4rem; margin-bottom:14px; opacity:.3; }
  .empty-tracks p { font-size:.88rem; font-weight:300; }

  .fav-section { animation:slideUp .28s ease; }
  .fav-group { margin-bottom:28px; }
  .fav-group-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; color:var(--gold); margin-bottom:10px; padding:0 4px; display:flex; align-items:center; gap:8px; }
  .fav-group-title::before { content:''; display:inline-block; width:3px; height:18px; background:var(--gold); border-radius:2px; }

  /* Player */
  .player-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(13,17,23,.97); backdrop-filter:blur(24px); border-top:1px solid var(--border); padding:12px 24px; z-index:100; transform:translateY(100%); transition:transform .35s cubic-bezier(.34,1.56,.64,1); }
  .player-bar.visible { transform:translateY(0); }
  .player-inner { max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:24px; }
  .player-info { min-width:0; display:flex; align-items:center; gap:10px; }
  .player-fav-btn { width:32px; height:32px; border-radius:50%; background:transparent; border:1px solid transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1.1rem; transition:all .18s; color:var(--text-muted); flex-shrink:0; }
  .player-fav-btn.active { color:var(--gold); }
  .player-fav-btn:hover { background:rgba(201,168,76,.12); border-color:rgba(201,168,76,.3); color:var(--gold); }
  .player-text { min-width:0; }
  .player-track-name { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:600; color:var(--gold-light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player-reciter-name { font-size:.74rem; color:var(--text-muted); font-weight:300; margin-top:2px; }
  .player-controls { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .player-btns { display:flex; align-items:center; gap:16px; }
  .ctrl-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; transition:color .18s; padding:4px; line-height:1; }
  .ctrl-btn:hover { color:var(--text); }
  .play-pause-btn { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--gold),#a87c2a); border:none; color:#1a1200; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; box-shadow:0 4px 16px rgba(201,168,76,.28); }
  .play-pause-btn:hover { transform:scale(1.08); }
  .progress-row { display:flex; align-items:center; gap:10px; width:300px; }
  .time-lbl { font-size:.7rem; color:var(--text-muted); font-family:monospace; min-width:32px; }
  .progress-bar { flex:1; height:3px; background:var(--dark-4); border-radius:4px; cursor:pointer; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--green-light)); border-radius:4px; width:0%; transition:width .1s linear; pointer-events:none; }
  .player-right { display:flex; align-items:center; justify-content:flex-end; gap:10px; }
  .vol-icon { color:var(--text-muted); font-size:.95rem; }
  input[type=range] { -webkit-appearance:none; width:80px; height:3px; background:var(--dark-4); border-radius:4px; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:11px; height:11px; border-radius:50%; background:var(--gold); cursor:pointer; }

  /* Modals */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.72); backdrop-filter:blur(5px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--dark-2); border:1px solid var(--border); border-radius:18px; padding:32px; width:100%; max-width:460px; transform:scale(.95) translateY(12px); transition:transform .22s; position:relative; max-height:90vh; overflow-y:auto; }
  .modal-overlay.open .modal { transform:scale(1) translateY(0); }
  .modal h3 { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:600; color:var(--gold-light); margin-bottom:22px; display:flex; align-items:center; gap:10px; }
  .modal-close { position:absolute; top:14px; right:14px; background:none; border:none; color:var(--text-muted); font-size:1.2rem; cursor:pointer; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .modal-close:hover { background:var(--dark-4); color:var(--text); }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:.74rem; font-weight:600; color:var(--text-muted); margin-bottom:7px; letter-spacing:.5px; text-transform:uppercase; }
  .form-group input, .form-group select, .form-group textarea { width:100%; background:var(--dark-3); border:1px solid var(--border); border-radius:10px; padding:11px 14px; color:var(--text); font-size:.9rem; font-family:'Inter',sans-serif; outline:none; transition:border-color .18s,box-shadow .18s; resize:none; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,.1); }
  .form-group input::placeholder, .form-group textarea::placeholder { color:var(--text-muted); }
  .form-group select option { background:var(--dark-3); }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }

  .src-tabs { display:flex; gap:3px; margin-bottom:12px; background:var(--dark-3); border-radius:10px; padding:3px; }
  .src-tab { flex:1; padding:8px; border-radius:8px; border:none; cursor:pointer; font-family:'Inter',sans-serif; font-size:.82rem; font-weight:500; color:var(--text-muted); background:transparent; transition:all .18s; text-align:center; }
  .src-tab.active { background:var(--dark-2); color:var(--gold-light); }

  .drop-zone { border:2px dashed var(--border); border-radius:12px; padding:26px 20px; text-align:center; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
  .drop-zone:hover, .drop-zone.drag-over { border-color:var(--gold); background:rgba(201,168,76,.05); }
  .drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-zone-icon { font-size:1.8rem; margin-bottom:8px; opacity:.5; }
  .drop-zone p { font-size:.84rem; color:var(--text-muted); line-height:1.6; }
  .drop-zone p strong { color:var(--gold); font-weight:500; }
  .drop-zone .sub { font-size:.74rem; opacity:.55; }
  .file-chosen { display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.25); border-radius:10px; margin-top:10px; }
  .file-chosen .fc-icon { font-size:1.2rem; flex-shrink:0; }
  .file-chosen .fc-name { flex:1; font-size:.84rem; color:var(--gold-light); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .file-chosen .fc-clear { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:.9rem; padding:2px; }
  .file-chosen .fc-clear:hover { color:#e07070; }

  .notif { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px); background:var(--dark-3); border:1px solid rgba(201,168,76,.5); border-radius:50px; padding:11px 22px; font-size:.86rem; font-weight:500; color:var(--gold-light); z-index:300; transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; display:flex; align-items:center; gap:8px; box-shadow:0 8px 32px rgba(0,0,0,.4); pointer-events:none; }
  .notif.show { transform:translateX(-50%) translateY(0); }

  @keyframes fadeIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}50%{box-shadow:0 0 0 6px rgba(201,168,76,0)}}
  .bars{display:flex;align-items:flex-end;gap:2px;height:14px}
  .bars span{width:3px;background:var(--gold);border-radius:2px;animation:barAnim .8s ease-in-out infinite}
  .bars span:nth-child(2){animation-delay:.15s}.bars span:nth-child(3){animation-delay:.3s}
  @keyframes barAnim{0%,100%{height:3px}50%{height:14px}}

  @media(max-width:640px){
    .player-inner{grid-template-columns:1fr;gap:10px}
    .player-right{justify-content:center}
    .progress-row{width:100%}
    header h1{font-size:2rem}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-ornament">✦ ◈ ✦</div>
    <h1>Библиотека Корана</h1>
    <p>Слушайте чтение Священного Корана лучшими чтецами мира</p>
    <div class="divider"><div class="divider-line"></div><div class="divider-icon">☽</div><div class="divider-line"></div></div>
  </header>

  <div class="main-tabs">
    <button class="main-tab active" onclick="switchTab('library')" id="tabLibrary">📚 Библиотека</button>
    <button class="main-tab" onclick="switchTab('favorites')" id="tabFavorites">⭐ Избранное <span class="fav-count" id="favCount" style="display:none">0</span></button>
  </div>

  <div id="viewLibrary">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Поиск чтеца или суры..." oninput="filterAll()">
    </div>
    <div class="controls">
      <button class="btn btn-gold" onclick="openModal('addReciterModal')">＋ Добавить чтеца</button>
      <button class="btn btn-ghost" id="addTrackBtn" onclick="openModal('addTrackModal')" style="display:none;">＋ Добавить чтение</button>
    </div>
    <div>
      <div class="section-title">Чтецы</div>
      <div class="reciters-grid" id="recitersGrid">
        <div class="empty-box"><div class="icon">🎙️</div><p>Чтецы ещё не добавлены</p></div>
      </div>
    </div>
    <div id="tracksPanel" style="display:none;"></div>
  </div>

  <div id="viewFavorites" style="display:none;"><div id="favoritesContent"></div></div>
</div>

<!-- Player -->
<div class="player-bar" id="playerBar">
  <div class="player-inner">
    <div class="player-info">
      <button class="player-fav-btn" id="playerFavBtn" onclick="toggleFavFromPlayer()" title="В избранное">☆</button>
      <div class="player-text">
        <div class="player-track-name" id="playerTrackName">—</div>
        <div class="player-reciter-name" id="playerReciter"></div>
      </div>
    </div>
    <div class="player-controls">
      <div class="player-btns">
        <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
        <button class="play-pause-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
      </div>
      <div class="progress-row">
        <span class="time-lbl" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar" onclick="seek(event)"><div class="progress-fill" id="progressFill"></div></div>
        <span class="time-lbl" id="totalTime" style="text-align:right">0:00</span>
      </div>
    </div>
    <div class="player-right">
      <span class="vol-icon" id="volIcon">🔊</span>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
    </div>
  </div>
</div>

<!-- Add Reciter -->
<div class="modal-overlay" id="addReciterModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addReciterModal')">✕</button>
    <h3>🎙️ Новый чтец</h3>
    <div class="form-group"><label>Имя чтеца *</label><input type="text" id="reciterName" placeholder="Например: Абдул-Басит Абдус-Самад"></div>
    <div class="form-group"><label>Краткое описание</label><textarea id="reciterDesc" rows="2" placeholder="Например: Египетский чтец, риваят Хафс"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addReciterModal')">Отмена</button>
      <button class="btn btn-gold" onclick="addReciter()">Добавить</button>
    </div>
  </div>
</div>

<!-- Add Track -->
<div class="modal-overlay" id="addTrackModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('addTrackModal')">✕</button>
    <h3>🎵 Новое чтение</h3>
    <div class="form-group"><label>Чтец *</label><select id="trackReciter"></select></div>
    <div class="form-group"><label>Название суры / чтения *</label><input type="text" id="trackName" placeholder="Например: Сура Аль-Фатиха"></div>
    <div class="form-group"><label>Описание</label><input type="text" id="trackDesc" placeholder="Например: Риваят Хафс, студийная запись"></div>
    <div class="form-group">
      <label>Аудиофайл *</label>
      <div class="src-tabs">
        <button class="src-tab active" onclick="switchSrcTab('file')" id="srcTabFile">📁 Файл с устройства</button>
        <button class="src-tab" onclick="switchSrcTab('url')" id="srcTabUrl">🔗 Ссылка (URL)</button>
      </div>
      <div id="srcFileSection">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="trackFile" accept="audio/*" onchange="handleFileSelect(event)">
          <div class="drop-zone-icon">🎵</div>
          <p><strong>Перетащите аудиофайл сюда</strong><br>или нажмите, чтобы выбрать файл<br><span class="sub">MP3, M4A, WAV, OGG, FLAC и другие</span></p>
        </div>
        <div class="file-chosen" id="fileChosen" style="display:none;">
          <span class="fc-icon">🎵</span>
          <span class="fc-name" id="fcName"></span>
          <button class="fc-clear" onclick="clearFile()">✕</button>
        </div>
      </div>
      <div id="srcUrlSection" style="display:none;">
        <input type="url" id="trackUrl" placeholder="https://example.com/audio.mp3">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('addTrackModal')">Отмена</button>
      <button class="btn btn-gold" onclick="addTrack()">Добавить</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>
<audio id="audioPlayer" ontimeupdate="updateProgress()" onended="nextTrack()" onloadedmetadata="updateDuration()"></audio>

<script>
let reciters  = JSON.parse(localStorage.getItem('qr_reciters')  || '[]');
let tracks    = JSON.parse(localStorage.getItem('qr_tracks')    || '[]');
let favorites = JSON.parse(localStorage.getItem('qr_favorites') || '[]');
let fileData  = {}; // id -> base64 dataURL (loaded from IDB on start)

let activeReciterId = null;
let currentTrackIndex = -1;
let isPlaying = false;
let currentSrcTab = 'file';
let currentTab = 'library';
let selectedFile = null;

const audio = document.getElementById('audioPlayer');

/* ── IndexedDB for storing audio files (localStorage too small for audio) ── */
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('quranDB', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('files');
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej();
  });
}
function saveFile(id, dataUrl) {
  return new Promise((res) => {
    const tx = db.transaction('files','readwrite');
    tx.objectStore('files').put(dataUrl, id);
    tx.oncomplete = res;
  });
}
function loadFile(id) {
  return new Promise((res) => {
    const tx = db.transaction('files','readonly');
    const req = tx.objectStore('files').get(id);
    req.onsuccess = () => res(req.result || null);
    req.onerror = () => res(null);
  });
}
function deleteFile(id) {
  if (!db) return;
  const tx = db.transaction('files','readwrite');
  tx.objectStore('files').delete(id);
}

function save() {
  localStorage.setItem('qr_reciters',  JSON.stringify(reciters));
  localStorage.setItem('qr_tracks',    JSON.stringify(tracks));
  localStorage.setItem('qr_favorites', JSON.stringify(favorites));
}

function notify(msg, icon='✅') {
  const el = document.getElementById('notif');
  el.innerHTML = icon + ' ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

/* ── Tab switching ── */
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('viewLibrary').style.display   = tab==='library'   ? '' : 'none';
  document.getElementById('viewFavorites').style.display = tab==='favorites' ? '' : 'none';
  document.getElementById('tabLibrary').classList.toggle('active',   tab==='library');
  document.getElementById('tabFavorites').classList.toggle('active', tab==='favorites');
  if (tab==='favorites') renderFavorites();
}

function switchSrcTab(tab) {
  currentSrcTab = tab;
  document.getElementById('srcFileSection').style.display = tab==='file' ? '' : 'none';
  document.getElementById('srcUrlSection').style.display  = tab==='url'  ? '' : 'none';
  document.getElementById('srcTabFile').classList.toggle('active', tab==='file');
  document.getElementById('srcTabUrl').classList.toggle('active',  tab==='url');
}

/* ── Drag & drop ── */
const dropZone = document.getElementById('dropZone');
['dragenter','dragover'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag-over'); }));
['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); }));
dropZone.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('audio/')) setSelectedFile(file);
  else notify('Пожалуйста, выберите аудиофайл', '⚠️');
});

function handleFileSelect(e) { const f = e.target.files[0]; if (f) setSelectedFile(f); }

function setSelectedFile(file) {
  selectedFile = file;
  document.getElementById('fileChosen').style.display = 'flex';
  document.getElementById('fcName').textContent = file.name;
  const nameInput = document.getElementById('trackName');
  if (!nameInput.value) nameInput.value = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
}

function clearFile() {
  selectedFile = null;
  document.getElementById('fileChosen').style.display = 'none';
  document.getElementById('fcName').textContent = '';
  document.getElementById('trackFile').value = '';
}

/* ── Modals ── */
function openModal(id) {
  if (id === 'addTrackModal') {
    const sel = document.getElementById('trackReciter');
    sel.innerHTML = reciters.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
    if (activeReciterId) sel.value = activeReciterId;
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.querySelectorAll('#'+id+' input[type=text],#'+id+' input[type=url],#'+id+' textarea').forEach(el=>el.value='');
  clearFile();
  document.getElementById('trackName') && (document.getElementById('trackName').value='');
  document.getElementById('trackDesc') && (document.getElementById('trackDesc').value='');
}
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));
document.addEventListener('keydown', e => { if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(o=>o.classList.remove('open')); });

/* ── Reciters ── */
function addReciter() {
  const name = document.getElementById('reciterName').value.trim();
  if (!name) { notify('Введите имя чтеца','⚠️'); return; }
  const r = { id: Date.now().toString(), name, desc: document.getElementById('reciterDesc').value.trim() };
  reciters.push(r); save(); renderReciters(); closeModal('addReciterModal');
  notify('Чтец добавлен'); selectReciter(r.id);
}
function deleteReciter(id, e) {
  e.stopPropagation();
  if (!confirm('Удалить чтеца и все его записи?')) return;
  tracks.filter(t=>t.reciterId===id).forEach(t=>deleteFile(t.id));
  favorites = favorites.filter(fid=>!tracks.find(t=>t.id===fid&&t.reciterId===id));
  tracks = tracks.filter(t=>t.reciterId!==id);
  reciters = reciters.filter(r=>r.id!==id); save();
  if (activeReciterId===id) { activeReciterId=null; document.getElementById('tracksPanel').style.display='none'; document.getElementById('addTrackBtn').style.display='none'; }
  renderReciters(); updateFavCount(); notify('Чтец удалён');
}
function renderReciters(filter='') {
  const grid = document.getElementById('recitersGrid');
  const q = filter.toLowerCase();
  const list = reciters.filter(r=>r.name.toLowerCase().includes(q));
  if (!list.length) { grid.innerHTML=`<div class="empty-box"><div class="icon">🎙️</div><p>${filter?'Ничего не найдено':'Чтецы ещё не добавлены'}</p></div>`; return; }
  grid.innerHTML = list.map(r=>{
    const count = tracks.filter(t=>t.reciterId===r.id).length;
    const initials = r.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    return `<div class="reciter-tab ${activeReciterId===r.id?'active':''}" onclick="selectReciter('${r.id}')">
      <div class="avatar">${initials}</div><span>${r.name}</span>
      ${count>0?`<span class="badge">${count}</span>`:''}
      <button class="del-btn" onclick="deleteReciter('${r.id}',event)">✕</button>
    </div>`;
  }).join('');
}
function selectReciter(id) {
  activeReciterId=id; renderReciters(document.getElementById('searchInput').value);
  renderTracks(); document.getElementById('addTrackBtn').style.display='inline-flex';
}

/* ── Add track ── */
function addTrack() {
  const reciterId = document.getElementById('trackReciter').value;
  const name = document.getElementById('trackName').value.trim();
  if (!reciterId) { notify('Выберите чтеца','⚠️'); return; }
  if (!name)      { notify('Введите название','⚠️'); return; }
  const t = { id: Date.now().toString(), reciterId, name, desc: document.getElementById('trackDesc').value.trim(), type:'url', url:'' };

  if (currentSrcTab === 'file') {
    if (!selectedFile) { notify('Выберите аудиофайл','⚠️'); return; }
    const reader = new FileReader();
    reader.onload = async ev => {
      await saveFile(t.id, ev.target.result);
      t.type = 'file';
      tracks.push(t); save();
      if (activeReciterId===reciterId) renderTracks();
      closeModal('addTrackModal'); notify('Запись добавлена');
    };
    reader.readAsDataURL(selectedFile);
  } else {
    const url = document.getElementById('trackUrl').value.trim();
    if (!url) { notify('Введите ссылку','⚠️'); return; }
    t.url = url; tracks.push(t); save();
    if (activeReciterId===reciterId) renderTracks();
    closeModal('addTrackModal'); notify('Запись добавлена');
  }
}

async function getTrackSrc(t) {
  if (t.type==='file') return await loadFile(t.id);
  return t.url || null;
}

/* ── Delete track ── */
function deleteTrack(id, e) {
  e.stopPropagation();
  if (tracks[currentTrackIndex]?.id===id) { audio.pause(); isPlaying=false; document.getElementById('playPauseBtn').textContent='▶'; currentTrackIndex=-1; document.getElementById('playerBar').classList.remove('visible'); }
  deleteFile(id);
  tracks = tracks.filter(t=>t.id!==id);
  favorites = favorites.filter(f=>f!==id);
  save(); renderTracks(); updateFavCount();
  if (currentTab==='favorites') renderFavorites();
  notify('Запись удалена');
}

/* ── Render tracks ── */
function renderTracks(filter='') {
  const panel = document.getElementById('tracksPanel');
  if (!activeReciterId) { panel.style.display='none'; return; }
  panel.style.display='block';
  const reciter = reciters.find(r=>r.id===activeReciterId);
  const q = filter.toLowerCase();
  const list = tracks.filter(t=>t.reciterId===activeReciterId).filter(t=>!q||t.name.toLowerCase().includes(q)||(t.desc&&t.desc.toLowerCase().includes(q)));
  const currentId = tracks[currentTrackIndex]?.id;
  panel.innerHTML = `<div class="tracks-panel">
    <div class="tracks-header">
      <div class="tracks-header-left">
        <div><h2>${reciter?reciter.name:''}</h2>${reciter?.desc?`<p>${reciter.desc}</p>`:''}</div>
        ${list.length>0?`<span class="badge">${list.length} ${plural(list.length)}</span>`:''}
      </div>
    </div>
    <div class="tracks-list">
      ${list.length===0
        ?`<div class="empty-tracks"><div class="icon">🎵</div><p>Записей нет — нажмите «＋ Добавить чтение»</p></div>`
        :list.map((t,i)=>{
          const active=t.id===currentId, isFav=favorites.includes(t.id);
          return `<div class="track-item ${active?'playing':''}" onclick="playTrack('${t.id}')">
            <div class="track-num">${active?`<div class="bars"><span></span><span></span><span></span></div>`:i+1}</div>
            <div class="track-info"><div class="track-name">${t.name}</div>${t.desc?`<div class="track-desc-text">${t.desc}</div>`:''}</div>
            <div class="track-actions">
              <div class="play-icon-wrap">${active&&isPlaying?'⏸':'▶'}</div>
              <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${t.id}',event)" title="${isFav?'Убрать из избранного':'В избранное'}">${isFav?'★':'☆'}</button>
              <button class="track-del-btn" onclick="deleteTrack('${t.id}',event)" title="Удалить">🗑</button>
            </div>
          </div>`;
        }).join('')
      }
    </div>
  </div>`;
}

/* ── Favorites ── */
function toggleFav(id, e) {
  e&&e.stopPropagation();
  if (favorites.includes(id)) favorites=favorites.filter(f=>f!==id);
  else favorites.push(id);
  save(); updateFavCount();
  renderTracks(document.getElementById('searchInput')?.value||'');
  if (currentTab==='favorites') renderFavorites();
  updatePlayerFavBtn();
}
function toggleFavFromPlayer() { const t=tracks[currentTrackIndex]; if(t) toggleFav(t.id); }
function updateFavCount() { const c=favorites.length, el=document.getElementById('favCount'); el.textContent=c; el.style.display=c>0?'':'none'; }
function updatePlayerFavBtn() {
  const t=tracks[currentTrackIndex], btn=document.getElementById('playerFavBtn');
  if (t&&favorites.includes(t.id)) { btn.textContent='★'; btn.classList.add('active'); }
  else { btn.textContent='☆'; btn.classList.remove('active'); }
}
function renderFavorites() {
  const container=document.getElementById('favoritesContent');
  const validFavs = favorites.filter(fid=>tracks.find(t=>t.id===fid));
  if (!validFavs.length) { container.innerHTML=`<div class="empty-box" style="padding:60px 20px;"><div class="icon">⭐</div><p>Вы ещё не добавили записи в избранное.<br>Нажмите ☆ рядом с любой записью.</p></div>`; return; }
  const grouped={};
  validFavs.forEach(fid=>{ const t=tracks.find(t=>t.id===fid); if(!t) return; (grouped[t.reciterId]=grouped[t.reciterId]||[]).push(t); });
  const currentId=tracks[currentTrackIndex]?.id;
  container.innerHTML=`<div class="fav-section">`+
    Object.keys(grouped).map(rid=>{
      const r=reciters.find(r=>r.id===rid)||{name:'Неизвестный чтец'};
      return `<div class="fav-group">
        <div class="fav-group-title">${r.name}</div>
        <div class="tracks-panel"><div class="tracks-list">
          ${grouped[rid].map((t,i)=>{
            const active=t.id===currentId;
            return `<div class="track-item ${active?'playing':''}" onclick="playTrack('${t.id}')">
              <div class="track-num">${active?`<div class="bars"><span></span><span></span><span></span></div>`:i+1}</div>
              <div class="track-info"><div class="track-name">${t.name}</div>${t.desc?`<div class="track-desc-text">${t.desc}</div>`:''}</div>
              <div class="track-actions">
                <div class="play-icon-wrap">${active&&isPlaying?'⏸':'▶'}</div>
                <button class="fav-btn active" onclick="toggleFav('${t.id}',event)" title="Убрать из избранного">★</button>
              </div>
            </div>`;
          }).join('')}
        </div></div>
      </div>`;
    }).join('')+`</div>`;
}

/* ── Playback ── */
async function playTrack(id) {
  const idx=tracks.findIndex(t=>t.id===id);
  if (idx<0) return;
  if (currentTrackIndex===idx) { togglePlay(); return; }
  currentTrackIndex=idx;
  const t=tracks[idx], r=reciters.find(r=>r.id===t.reciterId);
  const src=await getTrackSrc(t);
  if (!src) { notify('Аудиофайл недоступен','⚠️'); return; }
  audio.src=src;
  audio.play().then(()=>{
    isPlaying=true;
    document.getElementById('playPauseBtn').textContent='⏸';
    document.getElementById('playerBar').classList.add('visible');
    document.getElementById('playerTrackName').textContent=t.name;
    document.getElementById('playerReciter').textContent=r?r.name:'';
    updatePlayerFavBtn();
    renderTracks(document.getElementById('searchInput')?.value||'');
    if (currentTab==='favorites') renderFavorites();
  }).catch(()=>notify('Не удалось воспроизвести файл','⚠️'));
}
function togglePlay() {
  if (!audio.src) return;
  if (isPlaying) { audio.pause(); isPlaying=false; document.getElementById('playPauseBtn').textContent='▶'; }
  else { audio.play(); isPlaying=true; document.getElementById('playPauseBtn').textContent='⏸'; }
  renderTracks(document.getElementById('searchInput')?.value||'');
  if (currentTab==='favorites') renderFavorites();
}
function nextTrack() {
  if (currentTrackIndex<0) return;
  const rid=tracks[currentTrackIndex]?.reciterId, rt=tracks.filter(t=>t.reciterId===rid);
  const pos=rt.findIndex(t=>t===tracks[currentTrackIndex]);
  if (pos<rt.length-1) playTrack(rt[pos+1].id);
}
function prevTrack() {
  if (currentTrackIndex<0) return;
  if (audio.currentTime>3) { audio.currentTime=0; return; }
  const rid=tracks[currentTrackIndex]?.reciterId, rt=tracks.filter(t=>t.reciterId===rid);
  const pos=rt.findIndex(t=>t===tracks[currentTrackIndex]);
  if (pos>0) playTrack(rt[pos-1].id); else audio.currentTime=0;
}
function updateProgress() {
  if (!audio.duration) return;
  document.getElementById('progressFill').style.width=(audio.currentTime/audio.duration*100)+'%';
  document.getElementById('currentTime').textContent=fmt(audio.currentTime);
}
function updateDuration() { document.getElementById('totalTime').textContent=fmt(audio.duration); }
function seek(e) {
  const bar=document.getElementById('progressBar'), rect=bar.getBoundingClientRect();
  if (audio.duration) audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;
}
function setVolume(v) { audio.volume=v; document.getElementById('volIcon').textContent=v==0?'🔇':v<.5?'🔉':'🔊'; }
function fmt(s) { if(!s||isNaN(s)) return '0:00'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function plural(n) { const m=Math.abs(n)%100,m1=m%10; if(m>10&&m<20) return 'записей'; if(m1===1) return 'запись'; if(m1>=2&&m1<=4) return 'записи'; return 'записей'; }
function filterAll() { const q=document.getElementById('searchInput').value; renderReciters(q); if(activeReciterId) renderTracks(q); }

// Init
openDB().then(()=>{ renderReciters(); updateFavCount(); });
</script>
</body>
</html>
